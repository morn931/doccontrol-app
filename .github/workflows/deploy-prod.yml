name: Deploy to Vercel (Production)

# Deploys main to Vercel production using a Vercel token, so deployments run as
# the project owner regardless of which collaborator pushed (avoids Hobby-plan
# "Blocked" deployments for non-owner Git authors). Builds ON Vercel (not
# --prebuilt) so the project's environment variables are injected natively at
# build time. Vercel's own push-triggered auto-deploy for `main` is disabled in
# vercel.json so there are no duplicates.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_7t4zQrmyG8qEdQvaXenYb7DS
      VERCEL_PROJECT_ID: prj_FDvQ6B1L08JdoR9qukvtMJB6HhqJ
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Deploy to production (Vercel builds with project env vars)
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
